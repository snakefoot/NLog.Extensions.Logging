version: 6.0.0-{build} # Only change for major versions (e.g. 6.0)
image: Visual Studio 2026
configuration: Release
skip_tags: true
skip_branch_with_pr: true

environment:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  github_auth_token:
    secure: WYvd/k1xGCsDS+4iOhjzxA5/e36RjkxnuVOHpBR+eDtZNNjpYydCyNfd1COME9jI
  sonar_token:
    secure: OUI/jCbBF75TwKMPT+IfewdgwCgx9nQkRg3cYOEQNJeX5J2++oWS3dmpwO51XduP
  JAVA_HOME: C:\Program Files\Java\jdk17

build_script:
  - ps: .\build.ps1

nuget:
  disable_publish_on_pr: true

artifacts:
  - path: 'artifacts\*.nupkg'
  - path: 'artifacts\*.snupkg'

test_script:
  - set PATH=%JAVA_HOME%\bin;%PATH%
  - nuget.exe install OpenCover -ExcludeVersion -DependencyVersion Ignore
  - dotnet build --configuration release
  - OpenCover\tools\OpenCover.Console.exe -target:"dotnet.exe" -targetargs:"test --no-build --configuration release" -returntargetcode -output:coverage.xml -register:user
  - ps: .\run-sonar.ps1
  - ps: .\run-tests.ps1

deploy:
- provider: NuGet
  api_key:
    secure: FStb6Kr5sjHdPq4EzjHeXkW4DQDlS92kM9ZWDhApT68+j4WN7J7cnvvk3fj/hMxi
  on:
    branch: master
